name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q
